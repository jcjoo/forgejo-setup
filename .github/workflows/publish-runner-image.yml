# Builda e publica ghcr.io/<dono>/pso-forgejo-runner (runner + entrypoint +
# config já embutidos) toda vez que algum desses arquivos muda em main.
# Usa o GITHUB_TOKEN do próprio job — sem precisar de PAT com escopo de
# pacotes na sua conta.
name: publish-runner-image

on:
  push:
    branches: [main]
    paths:
      - runner-image/Dockerfile
      - runner-entrypoint.sh
      - runner-config.yml
      - .github/workflows/publish-runner-image.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: runner-image/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pso-forgejo-runner:latest
